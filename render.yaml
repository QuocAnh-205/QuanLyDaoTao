services:
  # 1. Backend Service (Spring Boot)
  - type: web
    name: stdmanager-backend
    env: docker
    dockerfilePath: quanlydaotaoc/stdmanager/Dockerfile
    dockerContext: quanlydaotaoc/stdmanager
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SERVER_PORT
        value: 8080
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 1433
      - key: DB_NAME
        value: stdmanager_db
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://stdmanager-frontend.onrender.com

  # 2. Frontend Service (Vite React)
  - type: web
    name: stdmanager-frontend
    runtime: static
    rootDir: quanlydaotaoc/frontend
    buildCommand: npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://stdmanager-backend.onrender.com/api/v1

